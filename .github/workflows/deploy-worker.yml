name: Deploy license worker

on:
  push:
    branches: [main]
    paths: ["worker/**"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        if: ${{ vars.WORKER_DEPLOY_ENABLED == 'true' }}
        with:
          node-version: 22
      - name: Deploy with wrangler
        if: ${{ vars.WORKER_DEPLOY_ENABLED == 'true' }}
        working-directory: worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Account-owned tokens can't discover the account; accept the id
          # from either a repo variable or a secret, whichever exists.
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID || secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install --no-fund --no-audit wrangler@4
          npx --yes wrangler deploy
      - name: Skipped notice
        if: ${{ vars.WORKER_DEPLOY_ENABLED != 'true' }}
        run: echo "Worker deploy skipped — set repo variable WORKER_DEPLOY_ENABLED=true and add CLOUDFLARE_API_TOKEN secret."
